<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Advanced To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="todo-app">

            <h1>To-Do List</h1>

            <!-- INPUT AREA -->

            <div class="input-area">

                <input type="text"
                    id="taskInput"
                    placeholder="Enter your task...">

                <button onclick="addTask()">
                    Add
                </button>

            </div>

            <!-- TASK STATS -->

            <div class="stats">

                <p>Total Tasks:
                    <span id="totalTasks">0</span>
                </p>

                <p>Completed:
                    <span id="completedTasks">0</span>
                </p>

            </div>

            <!-- TASK LIST -->

            <ul id="taskList"></ul>

            <!-- CLEAR BUTTON -->

            <button class="clear-btn"
                onclick="clearAllTasks()">

                Clear All

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
